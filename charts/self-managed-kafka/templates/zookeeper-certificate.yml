apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zookeeper-0-cert
  namespace: testing-kafka  # or where your gateway is
spec:
  secretName: zookeeper-0-tls
  commonName: "zookeeper-0.zookeeper.testing-kafka.svc.cluster.local"
  dnsNames:
    - "zookeeper-0.zookeeper"
    - "zookeeper-0.zookeeper.testing-kafka"
    - "zookeeper-0.zookeeper.testing-kafka.svc"
    - "zookeeper-0.zookeeper.testing-kafka.svc.cluster.local"
  issuerRef:
    name: sambo-cert-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
