apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd-virtualservice
  namespace: istio-ingress
spec:
  hosts:
    - "argocd-lab.msambo.link"
  gateways:
    - ingress-gateway
  http:
    - match:
        - uri:
            exact: /
      redirect:
        uri: /argocd
    - route:
        - destination:
            host: argo-cd-argocd-server.default.svc.cluster.local
            port:
              number: 80